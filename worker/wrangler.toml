# SUPABASE_URL - https://omdcfphbwuwsrffdszlg.supabase.co
# SUPABASE_SERVICE_KEY - service_role key (bypasses RLS, set via wrangler secret put)
# TG_BOT_TOKEN - Telegram bot token from @BotFather
# ALLOWED_CHAT_IDS - Comma-separated Telegram chat IDs allowed to use the bot
