name = "hc-telegram-bot"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secrets (set via `wrangler secret put <NAME>`):
# ANTHROPIC_API_KEY - Claude API key for natural language processing
# JSONBIN_MASTER_KEY - JSONBin.io master key for reading/writing events
# JSONBIN_BIN_ID - JSONBin.io bin ID
# TG_BOT_TOKEN - Telegram bot token from @BotFather
# ALLOWED_CHAT_IDS - Comma-separated Telegram chat IDs allowed to use the bot
